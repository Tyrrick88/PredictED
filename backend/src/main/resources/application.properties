spring.application.name=predicted-api
server.port=8080

spring.datasource.url=jdbc:h2:mem:predicted;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

spring.jackson.default-property-inclusion=non_null
management.endpoints.web.exposure.include=health,info
debug=false
logging.level.org.springframework=INFO

predicted.security.jwt.issuer=predicted-api
predicted.security.jwt.expiration-minutes=480
predicted.security.jwt.secret=dev-only-change-this-secret-before-production-64-chars-minimum
