spring.application.name=predicted-api
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/predicted;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration,classpath:db/vendor/{vendor}/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.h2.console.enabled=true
spring.data.redis.repositories.enabled=false

spring.jackson.default-property-inclusion=non_null
management.endpoints.web.exposure.include=health,info
debug=false
logging.level.org.springframework=INFO

predicted.security.jwt.issuer=predicted-api
predicted.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
predicted.security.jwt.secret=dev-only-change-this-secret-before-production-64-chars-minimum
predicted.security.production=${PREDICTED_SECURITY_PRODUCTION:false}
predicted.security.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
predicted.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:8}
predicted.security.rate-limit.uploads-per-minute=${RATE_LIMIT_UPLOADS_PER_MINUTE:12}
predicted.security.rate-limit.ai-per-minute=${RATE_LIMIT_AI_PER_MINUTE:30}
predicted.security.rate-limit.api-per-minute=${RATE_LIMIT_API_PER_MINUTE:240}
predicted.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173}
predicted.seed.demo-users-enabled=${PREDICTED_SEED_DEMO_USERS_ENABLED:true}
predicted.bootstrap-admin.email=${PREDICTED_BOOTSTRAP_ADMIN_EMAIL:}
predicted.bootstrap-admin.password=${PREDICTED_BOOTSTRAP_ADMIN_PASSWORD:}
predicted.bootstrap-admin.name=${PREDICTED_BOOTSTRAP_ADMIN_NAME:PredictED Admin}
predicted.oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
predicted.oauth.apple.client-id=${APPLE_OAUTH_CLIENT_ID:}
predicted.oauth.google.jwks-uri=${GOOGLE_OAUTH_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
predicted.oauth.apple.jwks-uri=${APPLE_OAUTH_JWKS_URI:https://appleid.apple.com/auth/keys}
predicted.oauth.http-timeout-seconds=${OAUTH_HTTP_TIMEOUT_SECONDS:5}
predicted.ai.provider=${AI_PROVIDER:fallback}
predicted.ai.openai.api-key=${OPENAI_API_KEY:}
predicted.ai.openai.model=${OPENAI_MODEL:gpt-4o}
predicted.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
predicted.ai.openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:25}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:25MB}
predicted.uploads.root=${UPLOAD_ROOT:./data/uploads}
predicted.uploads.max-file-bytes=${UPLOAD_MAX_FILE_BYTES:20971520}
