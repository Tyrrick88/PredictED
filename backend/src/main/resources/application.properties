spring.application.name=predicted-api
server.port=8080

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/predicted;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=true
spring.data.redis.repositories.enabled=false

spring.jackson.default-property-inclusion=non_null
management.endpoints.web.exposure.include=health,info
debug=false
logging.level.org.springframework=INFO

predicted.security.jwt.issuer=predicted-api
predicted.security.jwt.expiration-minutes=480
predicted.security.jwt.secret=dev-only-change-this-secret-before-production-64-chars-minimum
