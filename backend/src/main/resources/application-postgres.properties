spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/predicted}
spring.datasource.username=${DATABASE_USERNAME:predicted}
spring.datasource.password=${DATABASE_PASSWORD:predicted}
spring.jpa.hibernate.ddl-auto=validate

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

predicted.security.jwt.secret=${JWT_SECRET}
